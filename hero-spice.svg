<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1507"/>
      <stop offset="40%" style="stop-color:#7a3d15"/>
      <stop offset="100%" style="stop-color:#c47020"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#d4822a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#8b2e00;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <!-- Dekorativní kruhy — stylizace misky s kořením -->
  <circle cx="960" cy="620" r="320" fill="none" stroke="#d4822a" stroke-width="1" opacity="0.2"/>
  <circle cx="960" cy="620" r="260" fill="#8b3a00" opacity="0.35"/>
  <circle cx="960" cy="620" r="200" fill="#a04515" opacity="0.45"/>
  <circle cx="960" cy="620" r="140" fill="#c4601e" opacity="0.55"/>
  <circle cx="960" cy="620" r="80" fill="#e07830" opacity="0.7"/>
  <!-- Tečky — koření -->
  <circle cx="800" cy="580" r="8" fill="#f0a050" opacity="0.8"/>
  <circle cx="840" cy="550" r="6" fill="#e05010" opacity="0.7"/>
  <circle cx="880" cy="590" r="5" fill="#ffcc66" opacity="0.6"/>
  <circle cx="920" cy="565" r="7" fill="#d44010" opacity="0.8"/>
  <circle cx="960" cy="580" r="9" fill="#f0b840" opacity="0.75"/>
  <circle cx="1000" cy="560" r="6" fill="#cc3a08" opacity="0.7"/>
  <circle cx="1040" cy="590" r="8" fill="#f5c050" opacity="0.65"/>
  <circle cx="1080" cy="575" r="5" fill="#e08028" opacity="0.8"/>
  <circle cx="1120" cy="605" r="7" fill="#ffaa30" opacity="0.7"/>
  <!-- Stylizovaný text jako vodoznak -->
  <text x="960" y="280" font-family="Georgia, serif" font-size="72" font-style="italic" fill="white" opacity="0.08" text-anchor="middle">Vůně dálek</text>
  <text x="960" y="360" font-family="Georgia, serif" font-size="28" fill="white" opacity="0.06" text-anchor="middle" letter-spacing="8">ORIENTÁLNÍ KOŘENÍ</text>
</svg>
